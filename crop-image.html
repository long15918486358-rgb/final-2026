<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이미지 크롭 편집 도구</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "맑은 고딕", sans-serif;
        }
        body {
            background-color: #f7f8fa;
            padding: 60px 30px;
            max-width: 700px;
            margin: 0 auto;
        }
        .wrap {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        h2 {
            color: #222;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .item-box {
            margin-bottom: 22px;
        }
        p {
            font-size: 15px;
            color: #444;
            margin-bottom: 8px;
        }
        input[type="file"],
        input[type="number"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            font-size: 14px;
        }
        #imgShow{
            max-width: 100%;
            border: 1px solid #e4e7ed;
            border-radius: 8px;
            margin: 12px 0 24px;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: #407bff;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2b60de;
        }
        canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h2>JPG/PNG 이미지 업로드 후 영역 자르기 및 저장</h2>

        <div class="item-box">
            <input type="file" id="imgUpload" accept="image/png,image/jpeg">
        </div>

        < img id="imgShow">

        <div class="item-box">
            <p>시작 가로좌표 X</p >
            <input type="number" id="xStart" value="0">
        </div>
        <div class="item-box">
            <p>시작 세로좌표 Y</p >
            <input type="number" id="yStart" value="0">
        </div>
        <div class="item-box">
            <p>크롭할 가로 너비</p >
            <input type="number" id="cutWidth" value="300">
        </div>
        <div class="item-box">
            <p>크롭할 세로 높이</p >
            <input type="number" id="cutHeight" value="300">
        </div>

        <button onclick="cutPic()">이미지 자르기 및 다운로드</button>
        <canvas id="canvasBox"></canvas>
    </div>

    <script>
let sourceImg;
document.getElementById('imgUpload').onchange = function(e){
    const reader = new FileReader();
    reader.onload = function(ev){
        sourceImg = new Image();
        sourceImg.src = ev.target.result;
        sourceImg.onload = ()=>{
            document.getElementById('imgShow').src = ev.target.result;
        }
    }
    reader.readAsDataURL(e.target.files[0]);
}
function cutPic(){
    if(!sourceImg){
        alert("이미지 파일을 먼저 업로드해 주세요");
        return;
    }
    const x = Number(document.getElementById('xStart').value);
    const y = Number(document.getElementById('yStart').value);
    const w = Number(document.getElementById('cutWidth').value);
    const h = Number(document.getElementById('cutHeight').value);
    const canvas = document.getElementById('canvasBox');
    const ctx = canvas.getContext('2d');
    canvas.width = w;
    canvas.height = h;
    ctx.drawImage(sourceImg, x, y, w, h, 0, 0, w, h);
    const a = document.createElement('a');
    a.download = "크롭된_이미지.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
}
    </script>
</body>
</html>
